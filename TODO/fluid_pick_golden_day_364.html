<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>364 — Pick Your Golden Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <style>

    /* ================================
       TOKENS — unified system
    ================================ */
    :root {
      --bg-1:       #140810;
      --bg-2:       #2a0f22;
      --panel:      rgba(52, 18, 42, 0.68);
      --panel-edge: rgba(255, 255, 255, 0.07);
      --text:       #f8efe2;
      --muted:      rgba(248, 239, 226, 0.62);
      --gold-1:     #533517;
      --gold-2:     #8a6428;
      --gold-3:     #c49746;
      --gold-4:     #e8af48;
      --gold-5:     #feeaa5;
      --gold-glow:  rgba(232, 175, 72, 0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(100, 30, 90, 0.55) 0%, transparent 52%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.065'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 9999;
    }

    /* ================================
       FRAME
    ================================ */
    .frame {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    /* ================================
       PHONE SHELL
    ================================ */
    .phone {
      width: min(100%, 390px);
      min-height: 844px;
      position: relative;
      overflow: hidden;
      border-radius: 44px;
      background:
        radial-gradient(circle at 50% 14%, rgba(255,233,176,0.08), transparent 18%),
        linear-gradient(160deg, rgba(88,34,63,0.55) 0%, rgba(14,6,12,0.95) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(22px) saturate(1.15);
      -webkit-backdrop-filter: blur(22px) saturate(1.15);
    }

    .top-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,175,72,0.16), transparent 68%);
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
    }

    /* ================================
       CONTENT
    ================================ */
    .content {
      position: relative;
      z-index: 1;
      min-height: 844px;
      padding: 64px 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* ================================
       HEADER
    ================================ */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .deco-rule {
      position: relative;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(232,175,72,0.6) 40%,
        rgba(254,234,165,0.8) 50%,
        rgba(232,175,72,0.6) 60%,
        transparent
      );
      overflow: hidden;
    }

    .deco-rule::after {
      content: "";
      position: absolute;
      top: 0; left: -60%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
      animation: ruleSweep 5s ease-in-out 1s infinite;
    }

    @keyframes ruleSweep {
      0%   { left: -60%; opacity: 0; }
      10%  { opacity: 1; }
      55%  { left: 160%; opacity: 0; }
      100% { left: 160%; opacity: 0; }
    }

    .header-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-top: -4px;
      padding-left: 0.32em;
      background: linear-gradient(135deg,
        var(--gold-2)  0%,
        var(--gold-4) 30%,
        var(--gold-5) 50%,
        var(--gold-4) 70%,
        var(--gold-2) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 16px rgba(232,175,72,0.25));
    }

    /* ================================
       DESCRIPTION
    ================================ */
    .description {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-style: italic;
      font-weight: 300;
      line-height: 1.7;
      color: var(--muted);
      text-align: center;
      padding: 0 8px;
    }

    /* ================================
       CALENDAR PICKER — glass card
    ================================ */
    .picker-card {
      position: relative;
      width: 100%;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        0 20px 50px rgba(0,0,0,0.4);
      overflow: hidden;
      padding: 0 0 8px;
    }

    /* Shimmer top edge */
    .picker-card::before {
      content: "";
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(232,175,72,0.3) 30%,
        rgba(254,234,165,0.55) 50%,
        rgba(232,175,72,0.3) 70%,
        transparent
      );
      z-index: 2;
    }

    /* Inner top wash */
    .picker-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 35%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Month navigation bar ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 12px;
      position: relative;
      z-index: 2;
    }

    .month-label {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .nav-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--gold-4);
      font-size: 22px;
      font-weight: 300;
      border-radius: 10px;
      transition: background 0.2s, transform 0.15s;
      line-height: 1;
      padding-bottom: 2px;
    }

    .nav-arrow:hover { background: rgba(232,175,72,0.08); }
    .nav-arrow:active { transform: scale(0.88); }

    /* ── Weekday row ── */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px 6px;
      position: relative;
      z-index: 2;
    }

    .weekday {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: 0.1em;
      color: var(--gold-4);
      opacity: 0.5;
      padding: 4px 0;
    }

    /* ── Day grid ── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 0 12px 8px;
      position: relative;
      z-index: 2;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      position: relative;
    }

    .day-cell:not(.empty):hover {
      background: rgba(232,175,72,0.1);
      transform: scale(1.1);
    }

    .day-cell:not(.empty):active { transform: scale(0.9); }

    .day-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      user-select: none;
      line-height: 1;
    }

    /* Today ring */
    .day-cell.today {
      background: rgba(232,175,72,0.12);
    }
    .day-cell.today .day-num { color: var(--gold-4); font-weight: 500; }

    /* Selected — spinning gold ring */
    .day-cell.selected {
      background: transparent;
    }

    .day-cell.selected .day-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
    }

    .day-cell.selected .day-spin {
      position: absolute;
      width: 200%; height: 200%;
      left: -50%; top: -50%;
      animation: spin 4.5s linear infinite;
      background: conic-gradient(
        #533517   0deg, #6b4820  20deg, #8a6428  40deg,
        #b5862f  65deg, #c49746  85deg, #e8c36a 100deg,
        #feeaa5 118deg, #ffe0c8 124deg, #ffffff 127deg,
        #ffffff 133deg, #d4e4ff 136deg, #c49746 148deg,
        #8a6428 168deg, #533517 180deg, #6b4820 200deg,
        #8a6428 220deg, #b5862f 245deg, #c49746 265deg,
        #e8c36a 280deg, #feeaa5 298deg, #ffe0c8 304deg,
        #ffffff 307deg, #ffffff 313deg, #d4e4ff 316deg,
        #c49746 328deg, #8a6428 348deg, #533517 360deg
      );
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .day-cell.selected .day-inner {
      position: absolute;
      inset: 2.5px;
      border-radius: 50%;
      background: rgba(22, 8, 18, 0.92);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-cell.selected .day-num {
      position: relative;
      z-index: 2;
      color: var(--gold-5);
      font-weight: 500;
      text-shadow: 0 0 8px rgba(232,175,72,0.5);
    }

    /* Selected day glow pulse */
    .day-cell.selected {
      filter: drop-shadow(0 0 8px rgba(232,175,72,0.4));
      animation: selectedPulse 2.8s ease-in-out infinite;
    }

    @keyframes selectedPulse {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(232,175,72,0.3)); }
      50%       { filter: drop-shadow(0 0 14px rgba(254,234,165,0.6)); }
    }

    /* ── Selected date pill below grid ── */
    .selected-display {
      margin: 4px 16px 12px;
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid rgba(232,175,72,0.15);
      background: rgba(232,175,72,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .selected-display-text {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold-3), var(--gold-5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .selected-diamond {
      width: 5px; height: 5px;
      background: linear-gradient(145deg, var(--gold-2), var(--gold-5));
      transform: rotate(45deg);
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* ================================
       BOTTOM
    ================================ */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    /* Continue button — liquid gold */
    .continue-btn {
      position: relative;
      width: 100%;
      min-height: 58px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      overflow: hidden;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #1a0a05;

      background:
        radial-gradient(circle at 28% 22%,
          rgba(255,255,255,0.90) 0%,
          rgba(255,255,255,0.28) 10%,
          transparent 28%),
        radial-gradient(circle at 72% 78%,
          rgba(100,55,10,0.22), transparent 32%),
        linear-gradient(145deg,
          #6c4619  0%,
          #b97b29 28%,
          #edbf63 52%,
          #fff0b8 65%,
          #d4963e 82%,
          #7f531b 100%);

      box-shadow:
        0 0 0 1px rgba(255,236,178,0.26),
        0 14px 36px rgba(0,0,0,0.40),
        inset 0 2px 4px rgba(255,255,255,0.40),
        inset 0 -8px 14px rgba(84,46,10,0.20);

      transition: transform 0.18s, box-shadow 0.18s;
    }

    .continue-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(255,236,178,0.36),
        0 20px 44px rgba(0,0,0,0.46),
        inset 0 2px 4px rgba(255,255,255,0.42),
        inset 0 -8px 14px rgba(84,46,10,0.22);
    }

    .continue-btn:active { transform: scale(0.98); }

    /* Sheen sweep */
    .continue-btn::after {
      content: "";
      position: absolute;
      top: -50%; left: -80%;
      width: 55%; height: 200%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: skewX(-18deg);
      transition: left 0.55s ease;
      pointer-events: none;
    }

    .continue-btn:hover::after { left: 130%; }

    .footer-note {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      opacity: 0.7;
      text-align: center;
    }

  </style>
</head>
<body>

  <div class="frame">
    <div class="phone">
      <div class="top-glow"></div>

      <div class="content">

        <!-- HEADER -->
        <header class="header">
          <div class="deco-rule"></div>
          <div class="header-label">Choose Your</div>
          <div class="header-title">Golden Day</div>
          <div class="deco-rule"></div>
        </header>

        <!-- DESCRIPTION -->
        <p class="description">
          Pick one special day of the year<br>
          for <em>amore</em> instead of excuses.
        </p>

        <!-- PICKER CARD -->
        <div class="picker-card">

          <div class="month-nav">
            <div class="nav-arrow" onclick="prevMonth()">‹</div>
            <div class="month-label" id="monthLabel">MARCH 2026</div>
            <div class="nav-arrow" onclick="nextMonth()">›</div>
          </div>

          <div class="weekdays">
            <div class="weekday">S</div>
            <div class="weekday">M</div>
            <div class="weekday">T</div>
            <div class="weekday">W</div>
            <div class="weekday">T</div>
            <div class="weekday">F</div>
            <div class="weekday">S</div>
          </div>

          <div class="day-grid" id="dayGrid"></div>

          <!-- Selected date display -->
          <div class="selected-display">
            <div class="selected-diamond"></div>
            <div class="selected-display-text" id="selectedDisplay">8 March 2026</div>
            <div class="selected-diamond"></div>
          </div>

        </div>

        <!-- BOTTOM -->
        <div class="bottom">
          <button class="continue-btn" onclick="handleContinue()">Continue</button>
          <p class="footer-note">You can change this later.</p>
        </div>

      </div>
    </div>
  </div>

  <script>

    const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                    'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

    const MONTHS_LONG = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];

    const today = new Date();
    let viewMonth = today.getMonth();
    let viewYear  = today.getFullYear();

    // Default selection = today
    let selectedDay   = today.getDate();
    let selectedMonth = today.getMonth();
    let selectedYear  = today.getFullYear();

    function renderCalendar() {
      document.getElementById('monthLabel').textContent =
        MONTHS[viewMonth] + ' ' + viewYear;

      const grid      = document.getElementById('dayGrid');
      const firstDay  = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMon = new Date(viewYear, viewMonth + 1, 0).getDate();

      grid.innerHTML = '';

      // Empty cells
      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'day-cell empty';
        grid.appendChild(el);
      }

      // Day cells
      for (let d = 1; d <= daysInMon; d++) {
        const el = document.createElement('div');
        el.className = 'day-cell';

        const isToday    = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
        const isSelected = d === selectedDay && viewMonth === selectedMonth && viewYear === selectedYear;

        if (isToday && !isSelected)   el.classList.add('today');
        if (isSelected) {
          el.classList.add('selected');
          el.innerHTML = `
            <div class="day-ring"><div class="day-spin"></div></div>
            <div class="day-inner"></div>
            <span class="day-num">${d}</span>
          `;
        } else {
          el.innerHTML = `<span class="day-num">${d}</span>`;
        }

        el.addEventListener('click', () => {
          selectedDay   = d;
          selectedMonth = viewMonth;
          selectedYear  = viewYear;
          updateSelectedDisplay();
          renderCalendar();
        });

        grid.appendChild(el);
      }
    }

    function updateSelectedDisplay() {
      document.getElementById('selectedDisplay').textContent =
        selectedDay + ' ' + MONTHS_LONG[selectedMonth] + ' ' + selectedYear;
    }

    function prevMonth() {
      if (viewMonth === 0) { viewMonth = 11; viewYear--; }
      else viewMonth--;
      renderCalendar();
    }

    function nextMonth() {
      if (viewMonth === 11) { viewMonth = 0; viewYear++; }
      else viewMonth++;
      renderCalendar();
    }

    function handleContinue() {
      alert('Golden Day set: ' + selectedDay + ' ' + MONTHS_LONG[selectedMonth] + ' ' + selectedYear + '\n\nNavigating to calendar…');
    }

    renderCalendar();
    updateSelectedDisplay();

  </script>

</body>
</html>
