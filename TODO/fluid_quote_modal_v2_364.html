<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>364 Quote Modal v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ================================
       DESIGN TOKENS — matches nav/calendar
    ================================ */
    :root {
      --bg-deep:    #140810;
      --bg-mid:     #2a0f22;
      --panel:      rgba(38, 14, 32, 0.97);
      --panel-edge: rgba(255, 255, 255, 0.07);
      --text:       #f8efe2;
      --muted:      rgba(248, 239, 226, 0.52);
      --gold-1:     #533517;
      --gold-2:     #8a6428;
      --gold-3:     #c49746;
      --gold-4:     #e8af48;
      --gold-5:     #feeaa5;
      --gold-glow:  rgba(232, 175, 72, 0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      /* Switch to Cormorant for body — matches calendar aesthetic */
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(100,30,90,0.5) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 100%);
    }

    /* Grain overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 9999;
    }

    /* ================================
       DEMO FRAME — simulates overlay
    ================================ */
    .frame {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      background: rgba(8, 3, 10, 0.80);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ================================
       PHONE SHELL
    ================================ */
    .phone {
      width: min(100%, 390px);
      min-height: 844px;
      position: relative;
      border-radius: 44px;
      overflow: hidden;
      background:
        linear-gradient(160deg, rgba(88,34,63,0.5) 0%, rgba(18,8,14,0.9) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 18px;
    }

    /* ================================
       MODAL CARD
    ================================ */
    .modal-card {
      position: relative;
      width: 100%;
      max-width: 340px;
      border-radius: 28px;
      padding: 32px 28px 28px;

      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.04) 0%,
          rgba(255,255,255,0.01) 100%
        ),
        linear-gradient(160deg,
          rgba(52, 20, 44, 0.98) 0%,
          rgba(20, 8, 16, 0.99) 100%
        );
      border: 1px solid var(--panel-edge);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.07),
        inset 0 -1px 0 rgba(0,0,0,0.3),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 0 1px rgba(232,175,72,0.04);
      overflow: hidden;

      /* Entry animation */
      animation: cardIn 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top shimmer edge — matches nav/calendar treatment */
    .modal-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(232,175,72,0.35) 30%,
        rgba(254,234,165,0.55) 50%,
        rgba(232,175,72,0.35) 70%,
        transparent
      );
    }

    /* Ambient gold glow from top */
    .modal-card::after {
      content: "";
      position: absolute;
      top: -30px;
      left: 20%;
      right: 20%;
      height: 80px;
      background: radial-gradient(ellipse, rgba(232,175,72,0.08) 0%, transparent 70%);
      filter: blur(20px);
      pointer-events: none;
    }

    /* ================================
       DISMISS BUTTON — fluid glass ring
       Same 4-layer technique as nav indicator
    ================================ */

    /* Layer 0: positioning wrapper */
    .dismiss-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease;
    }

    .dismiss-btn:hover  { transform: scale(1.1); }
    .dismiss-btn:active { transform: scale(0.9); }

    /* Layer 1: outer glow */
    .dismiss-btn::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--gold-4);
      opacity: 0.10;
      filter: blur(10px);
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .dismiss-btn:hover::before { opacity: 0.22; }

    /* Layer 2: clip ring */
    .dismiss-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
    }

    /* Layer 3: spinning conic — matches nav bar exactly */
    .dismiss-spin {
      position: absolute;
      width: 200%;
      height: 200%;
      left: -50%;
      top: -50%;
      animation: spin 4.5s linear infinite;
      background: conic-gradient(
        #533517   0deg,
        #6b4820  20deg,
        #8a6428  40deg,
        #b5862f  65deg,
        #c49746  85deg,
        #e8c36a 100deg,
        #feeaa5 118deg,
        #ffe0c8 124deg,
        #ffffff 127deg,
        #ffffff 133deg,
        #d4e4ff 136deg,
        #c49746 148deg,
        #8a6428 168deg,
        #533517 180deg,
        #6b4820 200deg,
        #8a6428 220deg,
        #b5862f 245deg,
        #c49746 265deg,
        #e8c36a 280deg,
        #feeaa5 298deg,
        #ffe0c8 304deg,
        #ffffff 307deg,
        #ffffff 313deg,
        #d4e4ff 316deg,
        #c49746 328deg,
        #8a6428 348deg,
        #533517 360deg
      );
    }

    /* Layer 4: inner glass plate — 2px ring visible */
    .dismiss-inner {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: rgba(30, 10, 26, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: grid;
      place-items: center;
    }

    /* The × glyph itself */
    .dismiss-x {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      line-height: 1;
      color: var(--gold-4);
      opacity: 0.75;
      transition: opacity 0.2s;
      margin-top: -1px;
      pointer-events: none;
    }

    .dismiss-btn:hover .dismiss-x { opacity: 1; }

    /* Tooltip on × */
    .dismiss-btn::after {
      content: "dismiss · no tap used";
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.1em;
      color: rgba(232,175,72,0.45);
      white-space: nowrap;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .dismiss-btn:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* ================================
       DIAMOND DIVIDER
    ================================ */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 18px 0;
    }

    .div-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(232,175,72,0.4) 50%,
        transparent
      );
      position: relative;
      overflow: hidden;
    }

    /* Sweep shimmer along the line */
    .div-line::after {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent,
        rgba(254,234,165,0.9),
        transparent
      );
      animation: lineSweep 6s ease-in-out 1.5s infinite;
    }

    @keyframes lineSweep {
      0%    { left: -60%; opacity: 0; }
      10%   { opacity: 1; }
      50%   { left: 160%; opacity: 0; }
      100%  { left: 160%; opacity: 0; }
    }

    .diamond {
      width: 8px;
      height: 8px;
      background: linear-gradient(145deg, var(--gold-2), var(--gold-5));
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--gold-glow);
      animation: diamondPulse 2.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes diamondPulse {
      0%, 100% { transform: rotate(45deg) scale(0.75); box-shadow: 0 0 6px var(--gold-glow); }
      50%      { transform: rotate(45deg) scale(1.1);  box-shadow: 0 0 16px rgba(232,175,72,0.45); }
    }

    /* ================================
       QUOTE TEXT
    ================================ */
    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.55;
      text-align: center;
      color: var(--text);
      letter-spacing: 0.01em;
      text-wrap: balance;
      padding: 0 4px;

      /* Subtle gold warmth on the text */
      background: linear-gradient(160deg,
        #f8efe2 60%,
        rgba(232,175,72,0.6) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      animation: quoteIn 0.5s cubic-bezier(0.34, 1.1, 0.64, 1) 0.1s both;
    }

    @keyframes quoteIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ================================
       BRAND WATERMARK
       Styled as shareability artefact — small, gold, proud
    ================================ */
    .brand-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    .brand-mark {
      width: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,175,72,0.75));
    }

    .brand-mark.right {
      background: linear-gradient(90deg, rgba(232,175,72,0.75), transparent);
    }

    .brand-text {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: linear-gradient(135deg,
        var(--gold-3) 0%,
        var(--gold-5) 45%,
        var(--gold-4) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(232,175,72,0.3));
    }

    /* ================================
       ACTION BUTTONS — OUTSIDE CARD
       Clear hierarchy: Noted (primary) then Share (secondary, revealed after)
    ================================ */
    .actions {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: actionsIn 0.5s cubic-bezier(0.34, 1.1, 0.64, 1) 0.2s both;
    }

    @keyframes actionsIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* PRIMARY — Noted. Logs the tap, closes modal */
    .noted-btn {
      min-height: 56px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a0a05;
      position: relative;
      overflow: hidden;

      /* The liquid gold gradient — same conic language as the ring */
      background:
        radial-gradient(circle at 28% 22%,
          rgba(255,255,255,0.88) 0%,
          rgba(255,255,255,0.30) 10%,
          transparent 28%
        ),
        radial-gradient(circle at 72% 78%,
          rgba(100, 55, 10, 0.22),
          transparent 32%
        ),
        linear-gradient(145deg,
          #6c4619  0%,
          #b97b29 28%,
          #edbf63 52%,
          #fff0b8 65%,
          #d4963e 82%,
          #7f531b 100%
        );

      box-shadow:
        0 0 0 1px rgba(255,236,178,0.25),
        0 12px 32px rgba(0,0,0,0.35),
        inset 0 2px 4px rgba(255,255,255,0.38),
        inset 0 -6px 10px rgba(84,46,10,0.20);

      transition: transform 0.15s, box-shadow 0.15s;
    }

    .noted-btn:hover {
      transform: scale(1.02);
      box-shadow:
        0 0 0 1px rgba(255,236,178,0.35),
        0 16px 40px rgba(0,0,0,0.4),
        inset 0 2px 4px rgba(255,255,255,0.40),
        inset 0 -6px 10px rgba(84,46,10,0.22);
    }

    .noted-btn:active { transform: scale(0.97); }

    /* Sheen sweep on hover */
    .noted-btn::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -80%;
      width: 60%;
      height: 200%;
      background: linear-gradient(105deg,
        transparent,
        rgba(255,255,255,0.22),
        transparent
      );
      transform: skewX(-20deg);
      transition: left 0.5s ease;
    }

    .noted-btn:hover::after { left: 130%; }

    /* SECONDARY — Share. Outlined, appears after Noted pressed */
    .share-btn {
      min-height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(232,175,72,0.35);
      background: rgba(232,175,72,0.05);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;

      /* Hidden until Noted is pressed */
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.2s, background 0.2s;
    }

    .share-btn.revealed {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .share-btn:hover {
      border-color: rgba(232,175,72,0.6);
      background: rgba(232,175,72,0.10);
    }

    .share-icon {
      width: 14px;
      height: 14px;
      stroke: var(--gold-4);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.75;
    }

    /* ================================
       NOTED CONFIRMATION STATE
    ================================ */
    .noted-btn.confirmed {
      background:
        linear-gradient(145deg,
          rgba(50,30,15,0.9) 0%,
          rgba(80,55,20,0.9) 100%
        );
      box-shadow:
        0 0 0 1px rgba(232,175,72,0.2),
        0 6px 20px rgba(0,0,0,0.3);
      color: rgba(232,175,72,0.7);
      pointer-events: none;
    }

    /* ================================
       TAP COST LABEL — semantic clarity
    ================================ */
    .tap-label {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,175,72,0.32);
      text-align: center;
      margin-top: -4px;
    }

  </style>
</head>
<body>

  <div class="frame">
    <div class="phone">

      <!-- MODAL CARD -->
      <div class="modal-card" id="modalCard">

        <!--
          × dismiss = close WITHOUT logging tap
          Tooltip on hover makes the semantic clear
        -->
        <!-- Dismiss: fluid glass ring — same 4-layer technique as nav indicator -->
        <div class="dismiss-btn" id="dismissBtn" onclick="handleDismiss()">
          <div class="dismiss-ring"><div class="dismiss-spin"></div></div>
          <div class="dismiss-inner">
            <span class="dismiss-x">×</span>
          </div>
        </div>

        <!-- Divider top -->
        <div class="divider">
          <div class="div-line"></div>
          <div class="diamond"></div>
          <div class="div-line"></div>
        </div>

        <!-- Quote -->
        <p class="quote-text" id="quoteText">
          "Sorry, lovely. I've already committed to an evening of absolutely nothing."
        </p>

        <!-- Divider bottom -->
        <div class="divider">
          <div class="div-line"></div>
          <div class="diamond"></div>
          <div class="div-line"></div>
        </div>

        <!-- Brand watermark — shareability artefact -->
        <div class="brand-line">
          <div class="brand-mark"></div>
          <span class="brand-text">364 Ways to Say No</span>
          <div class="brand-mark right"></div>
        </div>

      </div>
      <!-- /modal-card -->

      <!-- ACTIONS — outside card, below -->
      <div class="actions">

        <!--
          PRIMARY: Noted.
          Logs the tap, reveals Share, shows confirmation state
        -->
        <button class="noted-btn" id="notedBtn" onclick="handleNoted()">
          Noted
        </button>

        <!-- Semantic hint: costs 1 tap -->
        <div class="tap-label" id="tapLabel">uses 1 tap</div>

        <!--
          SECONDARY: Share.
          Hidden until Noted is pressed — user has decided they like it
        -->
        <button class="share-btn" id="shareBtn" onclick="handleShare()">
          <svg class="share-icon" viewBox="0 0 24 24">
            <path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          Share this one
        </button>

      </div>

    </div>
  </div>

  <script>
    /* ================================
       STATE
       noted: has user confirmed this tap?
       In .tsx this maps to: onNoted() callback → decrements remainingTaps
    ================================ */

    let noted = false;

    function handleNoted() {
      if (noted) return;
      noted = true;

      const btn = document.getElementById('notedBtn');
      const share = document.getElementById('shareBtn');
      const label = document.getElementById('tapLabel');

      // Confirmed visual state
      btn.classList.add('confirmed');
      btn.textContent = '✓  Noted';

      // Reveal share — user has decided they like the quote
      share.classList.add('revealed');

      // Update tap label
      label.textContent = 'tap used';

      /*
        .tsx equivalent:
        onNoted(); // decrements remainingTaps in context
        setConfirmed(true);
        setShareVisible(true);
      */
    }

    function handleDismiss() {
      /*
        .tsx equivalent:
        onClose(); // no tap decrement if !confirmed
        If confirmed already, just close — tap already logged
      */
      alert(noted
        ? 'Close modal (tap already logged)'
        : 'Close modal — no tap used'
      );
    }

    function handleShare() {
      /*
        .tsx equivalent:
        Share.share({ message: quote + '\n\n364 Ways to Say No' });
      */
      alert('Share sheet would open here');
    }

    /* Demo: cycle quotes */
    const QUOTES = [
      '"Sorry, lovely. I\'ve already committed to an evening of absolutely nothing."',
      '"I\'m washing my hair that night."',
      '"My cat has a social commitment."',
      '"Mercury is in retrograde, darling."',
      '"I\'ve already overextended myself socially."',
    ];

    let qi = 0;
    document.querySelector('.phone').addEventListener('dblclick', () => {
      qi = (qi + 1) % QUOTES.length;
      document.getElementById('quoteText').textContent = QUOTES[qi];
      // Reset state
      noted = false;
      document.getElementById('notedBtn').classList.remove('confirmed');
      document.getElementById('notedBtn').textContent = 'Noted';
      document.getElementById('shareBtn').classList.remove('revealed');
      document.getElementById('tapLabel').textContent = 'uses 1 tap';
    });
  </script>

</body>
</html>
