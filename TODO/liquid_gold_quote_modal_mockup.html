<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>364 Quote Modal — Liquid Gold Mockup</title>
  <style>
    :root {
      --bg-1: #140810;
      --bg-2: #2a0f22;
      --overlay: rgba(0, 0, 0, 0.84);
      --panel: rgba(44, 16, 36, 0.94);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f8efe2;
      --muted: rgba(248, 239, 226, 0.68);
      --gold-1: #6f4a18;
      --gold-2: #a97022;
      --gold-3: #d6a548;
      --gold-4: #f0cf76;
      --gold-5: #fff0b8;
      --gold-glow: rgba(232, 181, 75, 0.24);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.46);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(241, 207, 120, 0.08), transparent 22%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    }

    .frame {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      background: var(--overlay);
    }

    .phone {
      width: min(100%, 430px);
      min-height: 880px;
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        linear-gradient(180deg, rgba(88, 34, 63, 0.50), rgba(18, 8, 14, 0.86));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 233, 176, 0.10), transparent 14%),
        radial-gradient(circle at 50% 60%, rgba(219, 165, 76, 0.05), transparent 24%);
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 880px;
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .card-wrap {
      position: relative;
      width: 100%;
      max-width: 340px;
    }

    .modal-card {
      position: relative;
      border-radius: 24px;
      padding: 30px 26px 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        linear-gradient(180deg, rgba(47, 18, 38, 0.96), rgba(24, 10, 19, 0.98));
      border: 1px solid var(--panel-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 18px 40px rgba(0,0,0,0.34);
      overflow: hidden;
    }

    .modal-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,240,184,0.06), transparent 16%),
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent 24%);
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      color: var(--gold-4);
      font-size: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px 0 22px;
    }

    .line {
      position: relative;
      width: 54px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(240, 207, 118, 0.55), transparent);
      overflow: hidden;
    }

    .line::after {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,240,184,0.9), transparent);
      animation: dividerSweep 7s ease-in-out infinite;
      opacity: 0.0;
    }

    .diamond {
      position: relative;
      width: 9px;
      height: 9px;
      background: linear-gradient(145deg, #b97b29, #fff0b8);
      transform: rotate(45deg) scale(0.7);
      box-shadow: 0 0 10px rgba(232, 175, 72, 0.24);
      overflow: hidden;
      animation: diamondPulse 1.9s ease-in-out infinite;
    }

    .diamond::after {
      content: "";
      position: absolute;
      inset: -30%;
      background: radial-gradient(circle, rgba(255,240,184,0.9), transparent 60%);
      animation: diamondGlow 7s ease-in-out infinite;
      opacity: 0;
    }

    .quote {
      margin: 0;
      text-align: center;
      font-size: 29px;
      line-height: 1.5;
      color: var(--text);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.01em;
      text-wrap: balance;
      padding: 0 6px;
    }

    .brand {
      margin-top: 2px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(240, 207, 118, 0.56);
    }

    .actions {
      width: 100%;
      max-width: 340px;
      display: grid;
      gap: 14px;
      margin-top: 2px;
    }

    .share-btn,
    .noted-btn {
      min-height: 54px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      display: grid;
      place-items: center;
    }

    .share-btn {
      background: transparent;
      border: 1px solid rgba(240, 207, 118, 0.70);
      color: var(--gold-4);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .noted-btn {
      color: #241305;
      border: 0;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.90) 0%, rgba(255,255,255,0.35) 12%, transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(120, 65, 10, 0.25), transparent 35%),
        linear-gradient(145deg, #6c4619 0%, #b97b29 30%, #edbf63 55%, #fff0b8 68%, #cc953e 85%, #7f531b 100%);
      box-shadow:
        0 0 0 1px rgba(255,236,178,0.28),
        0 12px 28px rgba(0,0,0,0.30),
        inset 0 2px 4px rgba(255,255,255,0.35),
        inset 0 -8px 12px rgba(84,46,10,0.18);
    }

    @keyframes dividerSweep {
      0%,100% { transform: translateX(0); opacity: 0; }
      35% { opacity: 0; }
      50% { transform: translateX(200%); opacity: 1; }
      65% { opacity: 0; }
    }

    @keyframes diamondPulse {
      0%, 100% { transform: rotate(45deg) scale(0.7); }
      42% { transform: rotate(45deg) scale(0.7); }
      50% { transform: rotate(45deg) scale(1); }
      58% { transform: rotate(45deg) scale(0.7); }
    }

    @keyframes diamondGlow {
      0%,100% { opacity: 0; }
      45% { opacity: 0; }
      50% { opacity: 1; }
      65% { opacity: 0; }
    }

    @media (max-width: 480px) {
      .content { padding: 24px 14px 20px; }
      .quote { font-size: 26px; }
      .line { width: 46px; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="phone">
      <div class="content">
        <div class="card-wrap">
          <div class="modal-card">
            <div class="divider">
              <div class="line"></div>
              <div class="diamond"></div>
              <div class="line"></div>
            </div>

            <p class="quote">“Sorry, lovely. I’ve already committed to an evening of absolutely nothing.”</p>

            <div class="divider">
              <div class="line"></div>
              <div class="diamond"></div>
              <div class="line"></div>
            </div>

            <div class="brand">364 Ways to Say No</div>
          </div>

          <div class="close-btn">×</div>
        </div>

        <div class="actions">
          <div class="share-btn">Share</div>
          <div class="noted-btn">Noted</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
